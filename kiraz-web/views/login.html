<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>KIRAZ Crafting System v2.9 - Discord Login</title>

<style>
    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0f0f1a;
        background: radial-gradient(circle, #1e1e2f 0%, #0f0f1a 100%);
        background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/public/japan-fantasy-landscape.jpg');
        background-attachment: fixed;
        background-size: cover;
        color: white;
        text-align: center;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .login-container {
        background: rgba(25, 25, 40, 0.95);
        padding: 40px;
        border-radius: 25px;
        width: 90%;
        max-width: 500px;
        border: 1px solid #3e3e5e;
        box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* NEU: Logo-Stil */
    #login-logo {
        width: 150px;
        height: 150px;
        display: block;
        margin-bottom: 30px;
        box-shadow: 0 0 20px rgba(255, 183, 197, 0.4);
        border-radius: 50%; /* Optional, falls das Logo rund sein soll */
    }

    .login-header {
        font-size: 2.2em;
        margin-bottom: 10px;
        color: #ffb7c5;
        text-shadow: 0 0 20px rgba(255, 183, 197, 0.6), 2px 2px 5px rgba(0,0,0,0.8);
    }

    .login-subtext {
        font-size: 1.1em;
        color: #ccc;
        margin-bottom: 40px;
        line-height: 1.5;
    }

    /* NEU: Discord Login Button Stil */
    .btn-discord {
        display: flex;
        align-items: center;
        gap: 12px;
        background-color: #5865F2; /* Discord Blau */
        color: white;
        text-decoration: none;
        padding: 15px 30px;
        border-radius: 12px;
        font-weight: bold;
        font-size: 1.2em;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: none;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .btn-discord:hover {
        background-color: #4752C4; /* Etwas dunkler beim Hover */
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5); /* Glowing-Effekt */
    }

    .btn-discord:active {
        transform: translateY(1px);
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Discord Glyphe (SVG) */
    .discord-icon {
        width: 24px;
        height: 24px;
        fill: currentColor;
    }

</style>
</head>
<body>

<div class="login-container">
    <!-- NEU: /public/ vor das Bild gesetzt -->
    <img id="login-logo" src="/public/image_2.png" alt="KIRAZ Logo">
    
    <h1 class="login-header">KIRAZ ROUTENNETZWERK</h1>
    <p class="login-subtext">Melde dich an, um auf das Fraktions-Dashboard für GPS-Routen, Crafting und Protokollierung zuzugreifen.</p>
    
    <!-- NEU: href="/login" eingefügt, damit der Button funktioniert -->
    <a href="/login" class="btn-discord">

</body>
</html>
