<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>KIRAZ System - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif; background: #0f0f1a; color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            text-align: center;
        }
        .login-box {
            background: #1e1e2f; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #ffb7c5;
        }
        .btn-discord {
            display: inline-block; background: #5865F2; color: white;
            padding: 15px 30px; font-size: 1.2em; font-weight: bold; text-decoration: none;
            border-radius: 10px; margin-top: 20px; transition: 0.3s;
        }
        .btn-discord:hover { background: #4752C4; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 style="color: #ffb7c5;">KIRAZ SYSTEM</h1>
        <p>Zugriff nur für autorisierte Fraktionsmitglieder.</p>
        <a href="/login" class="btn-discord">Mit Discord einloggen</a>
    </div>
</body>
</html>
